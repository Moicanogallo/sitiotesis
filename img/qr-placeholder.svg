<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Código QR (marcador de posición)">
  <rect width="240" height="240" fill="#ffffff"/>
  <!-- Patrón decorativo que evoca un QR; NO es funcional. Sustituir por el QR real. -->
  <g fill="#1f291d">
    <!-- Esquinas localizadoras -->
    <rect x="20" y="20" width="50" height="50"/>
    <rect x="30" y="30" width="30" height="30" fill="#ffffff"/>
    <rect x="38" y="38" width="14" height="14" fill="#1f291d"/>

    <rect x="170" y="20" width="50" height="50"/>
    <rect x="180" y="30" width="30" height="30" fill="#ffffff"/>
    <rect x="188" y="38" width="14" height="14" fill="#1f291d"/>

    <rect x="20" y="170" width="50" height="50"/>
    <rect x="30" y="180" width="30" height="30" fill="#ffffff"/>
    <rect x="38" y="188" width="14" height="14" fill="#1f291d"/>

    <!-- Módulos dispersos (estético) -->
    <rect x="90" y="30" width="12" height="12"/><rect x="110" y="30" width="12" height="12"/>
    <rect x="130" y="50" width="12" height="12"/><rect x="90" y="60" width="12" height="12"/>
    <rect x="30" y="90" width="12" height="12"/><rect x="50" y="90" width="12" height="12"/>
    <rect x="90" y="90" width="12" height="12"/><rect x="110" y="100" width="12" height="12"/>
    <rect x="130" y="90" width="12" height="12"/><rect x="150" y="110" width="12" height="12"/>
    <rect x="170" y="90" width="12" height="12"/><rect x="190" y="100" width="12" height="12"/>
    <rect x="90" y="130" width="12" height="12"/><rect x="110" y="140" width="12" height="12"/>
    <rect x="150" y="150" width="12" height="12"/><rect x="170" y="150" width="12" height="12"/>
    <rect x="190" y="170" width="12" height="12"/><rect x="110" y="170" width="12" height="12"/>
    <rect x="90" y="190" width="12" height="12"/><rect x="130" y="190" width="12" height="12"/>
    <rect x="150" y="190" width="12" height="12"/><rect x="190" y="190" width="12" height="12"/>
  </g>
  <text x="120" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" fill="#6b7280">QR de muestra — reemplazar por el definitivo</text>
</svg>
